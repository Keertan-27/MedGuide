<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MedGuide Chatbot</title>
		<link
			rel="stylesheet"
			href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
			integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"
			integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			type="text/css"
			href="{{ url_for('static', filename='style.css') }}"
		/>
	</head>

	<body>
		<main class="container-fluid h-100">
			<div class="row justify-content-center h-100">
				<section class="col-md-8 col-xl-6 chat" aria-label="Medical chatbot">
					<div class="card">
						<header class="card-header msg_head">
							<div class="d-flex bd-highlight">
								<div class="img_cont">
									<img
										src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
										class="rounded-circle user_img"
										alt="Medical chatbot avatar"
									/>
									<span class="online_icon"></span>
								</div>
								<div class="user_info">
									<span>Medical Chatbot</span>
									<p>Ask me anything about health and wellness.</p>
								</div>
							</div>
						</header>

						<div id="messageFormeight" class="card-body msg_card_body"></div>

						<footer class="card-footer">
							<form id="messageArea" class="input-group" aria-label="Message input form">
								<input
									type="text"
									id="text"
									name="msg"
									placeholder="Type your message..."
									autocomplete="off"
									class="form-control type_msg"
									required
								/>
								<div class="input-group-append">
									<button type="submit" id="send" class="input-group-text send_btn" aria-label="Send message">
										<i class="fas fa-location-arrow"></i>
									</button>
								</div>
							</form>
						</footer>
					</div>
				</section>
			</div>
		</main>

		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<script>
			$(function () {
				var $messageArea = $("#messageArea");
				var $messageInput = $("#text");
				var $messageContainer = $("#messageFormeight");

				function getTimeString() {
					var now = new Date();
					return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
				}

				function escapeHtml(text) {
					return $("<div>").text(text).html();
				}

				function appendUserMessage(message, time) {
					var safeMessage = escapeHtml(message);
					var html =
						'<div class="d-flex justify-content-end mb-4">' +
							'<div class="msg_cotainer_send">' +
								safeMessage +
								'<span class="msg_time_send">' + time + "</span>" +
							"</div>" +
							'<div class="img_cont_msg">' +
								'<img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg" alt="User avatar" />' +
							"</div>" +
						"</div>";

					$messageContainer.append(html);
				}

				function appendBotMessage(message, time) {
					var safeMessage = escapeHtml(message);
					var html =
						'<div class="d-flex justify-content-start mb-4">' +
							'<div class="img_cont_msg">' +
								'<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg" alt="Medical chatbot avatar" />' +
							"</div>" +
							'<div class="msg_cotainer">' +
								safeMessage +
								'<span class="msg_time">' + time + "</span>" +
							"</div>" +
						"</div>";

					$messageContainer.append(html);
					$messageContainer.scrollTop($messageContainer[0].scrollHeight);
				}

				$messageArea.on("submit", function (event) {
					event.preventDefault();

					var rawText = $messageInput.val().trim();
					if (!rawText) {
						return;
					}

					var sentAt = getTimeString();
					appendUserMessage(rawText, sentAt);
					$messageInput.val("");

					$.ajax({
						data: { msg: rawText },
						type: "POST",
						url: "/get"
					})
						.done(function (data) {
							appendBotMessage(data, getTimeString());
						})
						.fail(function () {
							appendBotMessage("Sorry, there was a network issue. Please try again.", getTimeString());
						});
				});
			});
		</script>
	</body>
</html>
